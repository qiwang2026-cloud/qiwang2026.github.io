<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>REI | Portfolio</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero">

<div class="hero-content">

<h1>REI</h1>

<h2>
International Business<br>
Entrepreneur<br>
Musician
</h2>

<p class="slogan">
Building Business Through Creativity,
Culture and Global Commerce.
</p>

<a href="#about" class="btn">
Explore
</a>

</div>

</header>

<section id="about">

<h2>About Me</h2>

<div id="profile"></div>

</section>

<section>

<h2>Skills</h2>

<div id="skills-container"></div>

</section>

<section>

<h2>Projects</h2>

<div id="projects-container"></div>

</section>

<section>

<h2>REI Doll Atelier</h2>

<div class="gallery">

<img src="doll1.jpg" alt="Doll Collection">

<img src="doll2.jpg" alt="Doll Collection">

</div>

</section>

<section id="toolkit">

<h2>Cross-Border Business Toolkit</h2>

<div class="tool-grid">

<div class="tool">

<h3>Profit Calculator</h3>

<input type="number" id="cost" placeholder="Product Cost">

<input type="number" id="shipping" placeholder="Shipping Cost">

<input type="number" id="price" placeholder="Selling Price">

<button onclick="calculateProfit()">
Calculate
</button>

<div id="profitResult"></div>

</div>

<div class="tool">

<h3>USD → KRW Converter</h3>

<input type="number" id="usd" placeholder="USD">

<button onclick="convertCurrency()">
Convert
</button>

<div id="currencyResult"></div>

</div>

<div class="tool">

<h3>Inventory Value Calculator</h3>

<input type="number" id="unitPrice" placeholder="Unit Price">

<input type="number" id="quantity" placeholder="Quantity">

<button onclick="calculateInventory()">
Calculate
</button>

<div id="inventoryResult"></div>

</div>

</div>

</section>

<footer>

<p>
© 2026 WANGQI (REI)
</p>

</footer>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
