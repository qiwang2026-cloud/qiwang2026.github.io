<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wang Qi | Resume & Portfolio</title>

  <meta name="description" content="Wang Qi Portfolio">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app-container">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="profile-card">

      <div class="avatar-wrapper">
        < img id="profile-avatar" src="" alt="Avatar" class="avatar-img">
      </div>

      <h1 id="profile-name">Loading...</h1>
      <div id="profile-nickname">Rei</div>
      <h2 id="profile-title">Loading...</h2>
      <p id="profile-bio">Loading...</p >

    </div>

    <ul class="contact-list">

      <li>
        <span>Email:</span>
        <a id="contact-email" href=" ">Loading...</a >
      </li>

      <li>
        <span>Phone:</span>
        <a id="contact-phone" href="#">Loading...</a >
      </li>

      <li>
        <span>Location:</span>
        <span id="contact-location">Loading...</span>
      </li>

      <li>
        <span>Website:</span>
        <a id="contact-website" href="#">Loading...</a >
      </li>

    </ul>

  </aside>

  <!-- MAIN -->
  <main class="content-area">

    <section id="about">
      <h2>About Me</h2>
      <p id="about-text">Loading...</p >
    </section>

    <section id="experience">
      <h2>Experience</h2>
      <div id="experience-timeline"></div>
    </section>

    <section id="education">
      <h2>Education</h2>
      <div id="education-timeline"></div>
    </section>

    <section id="skills">
      <h2>Skills</h2>
      <div id="skills-grid"></div>
    </section>

    <section id="projects">
      <h2>Projects</h2>
      <div id="projects-grid"></div>
    </section>

  </main>

</div>

<!-- IMPORTANT: order must NOT change -->
<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
