<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wang Qi | Portfolio</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- LEFT -->
  <aside class="sidebar">

    <div class="profile">
      <h1 id="profile-name">Loading...</h1>
      <p id="profile-title"></p >
      <p id="profile-bio" class="bio"></p >
    </div>

    <div class="contact">
      <a id="contact-email"></a >
      <a id="contact-phone"></a >
      <a id="contact-location"></a >
      <a id="contact-website"></a >
    </div>

  </aside>

  <!-- RIGHT -->
  <main class="main">

    <section class="card">
      <h2>Experience</h2>
      <div id="experience-timeline"></div>
    </section>

    <section class="card">
      <h2>Education</h2>
      <div id="education-timeline"></div>
    </section>

    <section class="card">
      <h2>Skills</h2>
      <div id="skills-grid"></div>
    </section>

    <section class="card">
      <h2>Projects</h2>
      <div id="projects-grid"></div>
    </section>

  </main>

</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
