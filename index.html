<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wang Qi | Resume & Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app-container">

  <!-- Sidebar -->
  <aside class="sidebar">

    <div class="profile-card">

      <div class="avatar-wrapper">
        < img id="profile-avatar" src="" alt="Avatar" class="avatar-img">
      </div>

      <h1 id="profile-name">Loading...</h1>
      <div id="profile-nickname">Rei</div>
      <h2 id="profile-title">Loading...</h2>
      <p id="profile-bio">Loading...</p >

    </div>

    <ul class="contact-list">
      <li><a id="contact-email"></a ></li>
      <li><a id="contact-phone"></a ></li>
      <li><span id="contact-location"></span></li>
      <li><a id="contact-website"></a ></li>
    </ul>

  </aside>

  <!-- Main -->
  <main class="content-area">

    <section>
      <h2>Experience</h2>
      <div id="experience-timeline"></div>
    </section>

    <section>
      <h2>Education</h2>
      <div id="education-timeline"></div>
    </section>

    <section>
      <h2>Skills Matrix</h2>
      <div id="skills-grid"></div>
    </section>

    <section>
      <h2>Featured Projects</h2>
      <div id="projects-grid"></div>
    </section>

  </main>

</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
