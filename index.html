<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wang Qi</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app-container">

  <aside class="sidebar">
    <h1 id="profile-name"></h1>
    <h3 id="profile-title"></h3>
    <p id="profile-bio"></p>

    <ul>
      <li>Email: <span id="contact-email"></span></li>
      <li>Phone: <span id="contact-phone"></span></li>
      <li>Location: <span id="contact-location"></span></li>
    </ul>
  </aside>

  <main class="content-area">

    <section>
      <h2>About</h2>
      <p id="about-text"></p>
    </section>

    <section>
      <h2>Experience</h2>
      <div id="experience-timeline"></div>
    </section>

    <section>
      <h2>Education</h2>
      <div id="education-timeline"></div>
    </section>

    <section>
      <h2>Skills</h2>
      <div id="skills-grid"></div>
    </section>

    <section>
      <h2>Projects</h2>
      <div id="projects-grid"></div>
    </section>

  </main>

</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
